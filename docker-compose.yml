# =============================================================================
# Docker Compose — E-Commerce Application Stack
# =============================================================================
# Services:
#   - db:  PostgreSQL 16 database
#   - app: Next.js application (runs migrations at startup)
# =============================================================================
# Usage:
#   docker compose up -d            # Start all services
#   docker compose up -d --build    # Rebuild and start
#   docker compose down             # Stop all services
#   docker compose logs -f app      # Follow app logs
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ecommerce-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3333}:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce?schema=public
      NEXTAUTH_URL: http://localhost:${APP_PORT:-3333}
      NEXTAUTH_SECRET: change-this-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
